<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>石头的博客</title>

<style>
:root {
    --bg: rgba(255,255,255,0.6);
    --text: #1d1d1f;
    --sub: #6e6e73;
    --accent: #0071e3;
}

@media (prefers-color-scheme: dark) {
    :root {
        --bg: rgba(30,30,30,0.6);
        --text: #f5f5f7;
        --sub: #a1a1a6;
    }
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif;
    background: linear-gradient(135deg, #dfe9f3, #ffffff);
    color: var(--text);
}

/* 顶部 */
header {
    position: sticky;
    top: 0;
    backdrop-filter: blur(20px);
    background: var(--bg);
    padding: 15px;
    text-align: center;
    font-weight: 600;
    border-bottom: 1px solid rgba(0,0,0,0.05);
}

/* 容器 */
.container {
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

/* 卡片 */
.card {
    background: var(--bg);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* 标题 */
h1 {
    margin: 0;
    font-size: 22px;
}

h2 {
    margin-top: 0;
}

/* 文字 */
p {
    color: var(--sub);
    line-height: 1.6;
}

/* 按钮 */
.button {
    display: inline-block;
    padding: 8px 14px;
    border-radius: 12px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    font-size: 14px;
}

/* 底部 */
footer {
    text-align: center;
    font-size: 13px;
    padding: 20px;
    color: var(--sub);
}

/* 手机优化 */
@media (max-width: 600px) {
    .container {
        padding: 15px;
    }
}
</style>
</head>

<body>

<header>
    石头的博客
</header>

<div class="container">

    <div class="card">
        <h2>👤 关于我</h2>
        <p>你好，我是一个喜欢设计和技术的人。</p>
        <p>正在学习前端开发，热爱创造简洁优雅的界面。</p>
    </div>

    <div class="card">
        <h2>📝 最新文章</h2>

        <h3>第一篇博客</h3>
        <p>这是一个苹果风博客模板，支持手机浏览。</p>

        <h3>设计心得</h3>
        <p>简洁、留白和层次感，是优秀 UI 的关键。</p>

        <br>
        <a class="button" href="#">查看更多</a>
    </div>

    <div class="card">
        <h2>📮 联系方式</h2>
        <p>Email: your@email.com</p>
    </div>

</div>

<footer>
    © 2026 我的博客
</footer>

</body>
</html>
